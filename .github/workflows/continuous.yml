name: Build and test

on: push

jobs:
  build_and_test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          cache: true

      # Lint, format check and type check are platform-independent, so run once.
      - name: Lint
        if: matrix.os == 'ubuntu-latest'
        run: |
          pixi run ruff check src/ tests/
          pixi run ruff format --check src/ tests/

      - name: Type check
        if: matrix.os == 'ubuntu-latest'
        run: pixi run mypy

      - name: Test
        run: pixi run -e full pytest

      - name: Build wheels
        run: pipx run build

      - name: Check metadata
        run: pipx run twine check dist/*
