name: Build and test

on: push

jobs:
  build_and_test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          cache: true

      - name: Test
        run: pixi run pytest

      - name: Build wheels
        run: pipx run build

      - name: Check metadata
        run: pipx run twine check dist/*
