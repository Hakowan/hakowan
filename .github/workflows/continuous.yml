name: Build and test

on: push

jobs:
  build_and_test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Test
        run: pipx run tox

      - name: Build wheels
        run: pipx run build

      - name: Check metadata
        run: pipx run twine check dist/*
