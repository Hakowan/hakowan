<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>{{TITLE}}</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: rgb({{BG_R_255}}, {{BG_G_255}}, {{BG_B_255}}); overflow: hidden; }
  #viewer { width: 100vw; height: 100vh; display: block; }
  #status {
    position: absolute; top: 8px; left: 8px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px; color: #ccc;
    background: rgba(0,0,0,0.4); padding: 4px 8px; border-radius: 4px;
    pointer-events: none;
  }
  #status.hidden { display: none; }
</style>
</head>
<body>
<canvas id="viewer"></canvas>
<div id="status">loading…</div>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@{{THREE_VERSION}}/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@{{THREE_VERSION}}/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const GLB_DATA_URI = "{{GLB_DATA_URI}}";
const INITIAL_EYE    = {{INITIAL_EYE}};
const INITIAL_TARGET = {{INITIAL_TARGET}};
const INITIAL_UP     = {{INITIAL_UP}};
const BG_COLOR = [{{BG_R}}, {{BG_G}}, {{BG_B}}];

const canvas = document.getElementById('viewer');
const status = document.getElementById('status');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const scene = new THREE.Scene();
scene.background = new THREE.Color(BG_COLOR[0], BG_COLOR[1], BG_COLOR[2]);

let camera = new THREE.PerspectiveCamera(45, 1, 0.01, 1000);
camera.position.set(INITIAL_EYE[0], INITIAL_EYE[1], INITIAL_EYE[2]);
camera.up.set(INITIAL_UP[0], INITIAL_UP[1], INITIAL_UP[2]);
camera.lookAt(INITIAL_TARGET[0], INITIAL_TARGET[1], INITIAL_TARGET[2]);

const controls = new OrbitControls(camera, canvas);
controls.target.set(INITIAL_TARGET[0], INITIAL_TARGET[1], INITIAL_TARGET[2]);
controls.enableDamping = true;
controls.update();

// Default 3-point lighting; replaced by glTF lights once Envmap support lands.
const keyLight = new THREE.DirectionalLight(0xffffff, 1.6);
keyLight.position.set(2, 3, 4);
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0xffffff, 0.5);
fillLight.position.set(-3, 1, 2);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffffff, 0.4);
rimLight.position.set(0, -2, -3);
scene.add(rimLight);

scene.add(new THREE.AmbientLight(0xffffff, 0.25));

function resize() {
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  if (canvas.width !== w || canvas.height !== h) {
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
}

window.addEventListener('resize', resize);

const loader = new GLTFLoader();
const onLoaded = (gltf) => {
  scene.add(gltf.scene);

  // Prefer the camera baked into the glTF if there is one.
  if (gltf.cameras && gltf.cameras.length > 0) {
    const cam = gltf.cameras[0];
    if (cam.isPerspectiveCamera) {
      const aspectFromCanvas = canvas.clientWidth / canvas.clientHeight;
      camera = new THREE.PerspectiveCamera(
        THREE.MathUtils.radToDeg(cam.fov ? THREE.MathUtils.degToRad(cam.fov) : 0.7853981633974483),
        aspectFromCanvas,
        cam.near, cam.far
      );
      // cam.fov is already in degrees on three.js side.
      camera.fov = cam.fov;
      camera.near = cam.near;
      camera.far = cam.far;
      camera.position.set(INITIAL_EYE[0], INITIAL_EYE[1], INITIAL_EYE[2]);
      camera.up.set(INITIAL_UP[0], INITIAL_UP[1], INITIAL_UP[2]);
      camera.lookAt(INITIAL_TARGET[0], INITIAL_TARGET[1], INITIAL_TARGET[2]);
      camera.updateProjectionMatrix();
      controls.object = camera;
      controls.update();
    }
  }

  status.classList.add('hidden');
  window.__hakowan_loaded = true;
};
const onError = (err) => {
  status.textContent = 'failed to load scene: ' + err;
  console.error(err);
};
if (GLB_DATA_URI.startsWith('data:')) {
  const binary = Uint8Array.from(atob(GLB_DATA_URI.split(',')[1]), c => c.charCodeAt(0));
  loader.parse(binary.buffer, '', onLoaded, onError);
} else {
  loader.load(GLB_DATA_URI, onLoaded, undefined, onError);
}

function animate() {
  resize();
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
resize();
animate();
</script>
</body>
</html>
